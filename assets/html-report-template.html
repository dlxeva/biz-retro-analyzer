<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{REPORT_TITLE}}</title>
  <link rel="stylesheet" href="./html-report.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">{{OUTPUT_MODE}}</p>
      <h1>{{REPORT_TITLE}}</h1>

        <span class="chip"><strong>Project stage</strong> {{PROJECT_STAGE}}</span>
        <span class="chip"><strong>Context</strong> {{CONTEXT_NOTE}}</span>
      </div>
    </section>
  </main>
</body>
</html>
